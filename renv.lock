      "Authors@R": "c(person(\"Sungkyu\", \"Jung\", email = \"sungkyu@snu.ac.kr\", role = c(\"aut\",\"cph\")), person(\"Seungki\", \"Hong\", email = \"skgaboja@snu.ac.kr\", role = c(\"aut\", \"cre\")), person(\"Kiho\", \"Park\", role = c(\"ctb\")), person(\"Byungwon\", \"Kim\", role = c(\"ctb\")))",
